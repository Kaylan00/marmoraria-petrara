<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Petrara — Mármores & Granitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@300;400;500;600;700&family=Bodoni+Moda:wght@400;500;600&family=DM+Sans:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="sections.css" />
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home-sections.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "moss",
  "typepair": "tech",
  "hero": "full"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [modalOpen, setModalOpen] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.setAttribute("data-palette", t.palette);
    document.documentElement.setAttribute("data-typepair", t.typepair);
  }, [t.palette, t.typepair]);

  useReveal();

  const Hero = t.hero === "split" ? HeroSplit : t.hero === "editorial" ? HeroEditorial : HeroFull;
  const heroTransparent = t.hero === "full";

  return (
    <>
      <Topbar />
      <Header active="home" transparent={heroTransparent} onCTAClick={() => setModalOpen(true)} />
      <Hero onCTA={() => setModalOpen(true)} />
      <About onCTA={() => setModalOpen(true)} />
      <Services />
      <Differentials />
      <PortfolioGrid />
      <Testimonials />
      <Blog />
      <Newsletter />
      <Footer />
      <Floaters />
      <QuoteModal open={modalOpen} onClose={() => setModalOpen(false)} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Identidade visual" />
        <TweakRadio label="Paleta" value={t.palette}
          options={[
            { value: "travertino", label: "Travertino" },
            { value: "onyx", label: "Onyx" },
            { value: "moss", label: "Musgo" },
          ]}
          onChange={(v) => setTweak("palette", v)} />
        <TweakRadio label="Fontes" value={t.typepair}
          options={[
            { value: "default", label: "Cormorant + Inter" },
            { value: "modern", label: "Playfair + Manrope" },
            { value: "condensed", label: "Bodoni + DM Sans" },
            { value: "tech", label: "Space Grotesk + JetBrains Mono" },
          ]}
          onChange={(v) => setTweak("typepair", v)} />
        <TweakSection label="Hero" />
        <TweakRadio label="Layout do hero" value={t.hero}
          options={[
            { value: "full", label: "Full" },
            { value: "split", label: "Split" },
            { value: "editorial", label: "Edit." },
          ]}
          onChange={(v) => setTweak("hero", v)} />
        <TweakSection label="Ações" />
        <TweakButton label="Abrir modal de orçamento" onClick={() => setModalOpen(true)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
